# Default values for valkey-operator.

# Operator image configuration
image:
  repository: valkey-operator
  tag: ""  # Defaults to appVersion
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []
# - name: regcred

# Override the name of the chart
nameOverride: ""
fullnameOverride: ""

# Number of operator replicas (only 1 is active due to leader election)
replicaCount: 1

# Operator configuration
operator:
  # Log level (trace, debug, info, warn, error)
  logLevel: info

  # Leader election settings
  leaderElection:
    enabled: true
    leaseDuration: 15
    renewDeadline: 10
    retryPeriod: 2

  # Health server port
  healthPort: 8080

# Admission webhook configuration.
#
# When enabled, the chart deploys a webhook Service, a cert-manager Certificate for the
# serving cert, and a ValidatingWebhookConfiguration registering the operator's webhook.
# This enforces validation the CRD schema cannot express — most importantly blocking
# ValkeyCluster spec changes while an upgrade is in flight, and image downgrades.
#
# Requires cert-manager to be installed in the cluster.
webhook:
  # Enable the admission webhook (Service + Certificate + ValidatingWebhookConfiguration).
  enabled: false
  # Port the operator's webhook server listens on (matches WEBHOOK_PORT in the binary).
  port: 9443
  # failurePolicy for the ValidatingWebhookConfiguration. "Fail" enforces protection
  # (recommended); "Ignore" fails open if the webhook is unreachable.
  failurePolicy: Fail
  # Webhook call timeout in seconds.
  timeoutSeconds: 5
  # cert-manager certificate settings for the webhook serving cert.
  certificate:
    # Duration and renewal window for the issued certificate.
    duration: 8760h # 1 year
    renewBefore: 720h # 30 days
    # Issuer to mint the serving cert. By default the chart creates a self-signed Issuer.
    # Set create=false and provide an existing issuerRef to use your own CA.
    issuerRef:
      create: true
      name: ""
      kind: Issuer
      group: cert-manager.io

# Service account configuration
serviceAccount:
  # Create service account
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account (generated if not set)
  name: ""

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# Install the ValkeyCluster CRD
crd:
  install: true
  # Keep CRD on chart uninstall (recommended to prevent data loss)
  keep: true

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector for operator pod
nodeSelector: {}

# Tolerations for operator pod
tolerations: []

# Affinity rules for operator pod
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: health
  initialDelaySeconds: 15
  periodSeconds: 20

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: health
  initialDelaySeconds: 5
  periodSeconds: 10

# Prometheus ServiceMonitor (requires prometheus-operator)
serviceMonitor:
  enabled: false
  # Additional labels for the ServiceMonitor
  labels: {}
  # Scrape interval
  interval: 30s
  # Scrape timeout
  scrapeTimeout: 10s
  # Metric relabeling configs
  metricRelabelings: []
  # Relabeling configs
  relabelings: []

# Pod priority class name
priorityClassName: ""

# Termination grace period
terminationGracePeriodSeconds: 10

# Extra environment variables
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# Extra volume mounts
extraVolumeMounts: []

# Extra volumes
extraVolumes: []
