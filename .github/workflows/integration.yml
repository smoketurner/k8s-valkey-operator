name: Integration Tests

# Runs the end-to-end integration suite (tests/integration/) against a real
# Kubernetes cluster created with kind. These tests are marked #[ignore] and are
# not part of the regular CI workflow because they require a live cluster, pull
# Valkey images, and schedule real pods. They run nightly and on demand.

on:
  schedule:
    - cron: "0 7 * * *" # nightly at 07:00 UTC
  workflow_dispatch:
    inputs:
      test_filter:
        description: >-
          Optional space-separated cargo test name filter(s) to run a focused
          subset (e.g. "degraded deletion"). Empty runs the full suite. When set,
          operator debug logging is enabled for easier diagnosis.
        required: false
        default: ""

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CLUSTER_NAME: valkey-it
  # The production runtime allocates an 8 MiB stack per worker thread
  # (src/main.rs), because the reconcile state machine is stack-heavy. The
  # #[tokio::test(flavor = "multi_thread")] runtime used by the integration
  # tests defaults to a 2 MiB worker stack, which overflows on the deepest
  # reconcile paths in a debug build. RUST_MIN_STACK raises the worker-thread
  # stack to match/exceed production.
  RUST_MIN_STACK: "16777216"

jobs:
  integration:
    name: Integration Tests (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:v1.36.1
          cluster_name: ${{ env.CLUSTER_NAME }}

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.20.3/cert-manager.yaml
          kubectl -n cert-manager rollout status deploy/cert-manager --timeout=180s
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s
          kubectl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=180s

      - name: Create selfsigned ClusterIssuer
        # TLS is mandatory for every ValkeyCluster, and the test fixtures
        # (tests/common/fixtures.rs) reference a ClusterIssuer named
        # "selfsigned-issuer". cert-manager must already have it so it can issue
        # each cluster's Certificate; otherwise pods never get their TLS secret
        # and the tests time out waiting for an operational cluster.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: selfsigned-issuer
          spec:
            selfSigned: {}
          EOF

      # Valkey images (valkey/valkey:9.0.0-alpine and :9.0.1-alpine, used by the
      # upgrade tests) are pulled on demand by the kind node when pods are
      # scheduled. We intentionally do not `kind load` them: the v1.36.1 node
      # image uses containerd config v4, which the bundled kind's image-import
      # path does not support.

      - name: Install CRDs and RBAC
        run: make install

      - name: Run integration tests
        # Run serially. Each test stands up its own multi-pod Valkey cluster (and
        # the upgrade tests drive a full multi-shard upgrade), so running two at
        # once on a 2-core runner starves them and pushes operations past their
        # per-test timeouts (flaky deletion/recovery waits). Tests are
        # namespace-isolated, so serial execution only affects wall-clock.
        #
        # An optional workflow_dispatch `test_filter` input runs a focused subset
        # with operator debug logging, for diagnosing specific failures.
        env:
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          read -ra filters <<< "${TEST_FILTER}"
          if [ "${#filters[@]}" -gt 0 ]; then
            echo "Running focused subset: ${filters[*]}"
            RUST_LOG=info,valkey_operator=debug \
              cargo test --test integration -- --ignored --test-threads=1 "${filters[@]}"
          else
            cargo test --test integration -- --ignored --test-threads=1
          fi
